---
- name: Deploy infraestrutura orientado a mudanças
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Carregar interface.yml
      set_fact:
        interface: "{{ lookup('file', 'interface.yml') | from_yaml }}"

    - name: Obter versão anterior do interface.yml
      command: git show HEAD~1:interface.yml
      register: prev_interface
      failed_when: false
      changed_when: false

    - name: Definir recursos alterados
      vars:
        prev: "{{ prev_interface.stdout | from_yaml if prev_interface.rc == 0 else {} }}"
      set_fact:
        changed_resources: >-
          {%- set changed = [] -%}
          {%- for key in interface.keys() -%}
            {%- if prev.get(key) != interface[key] -%}
              {%- set _ = changed.append(key) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ changed }}

    - name: Deploy só o que mudou
      include_role:
        name: azure
        tasks_from: "create_{{ resource_type }}"
      vars:
        resource_data: "{{ interface[resource_type] }}"
      loop: "{{ changed_resources }}"
      loop_control:
        loop_var: resource_type
        label: "{{ resource_type }}"
